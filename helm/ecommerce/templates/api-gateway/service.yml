apiVersion: v1
kind: Service

metadata:
  name: api-gateway-service
  namespace: {{ .Values.namespace }}
spec:
  type: ClusterIP
  selector:
    app: api-gateway-app

  ports:
    - protocol: TCP
      port: {{ .Values.apiGateway.service.port }}
      targetPort: {{ .Values.apiGateway.service.targetPort }}
