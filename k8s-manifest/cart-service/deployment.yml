apiVersion: apps/v1
kind: Deployment


metadata:
  name: cart-service-del
  namespace: ecommerce

spec:

  replicas: 1
  
  selector:
    matchLabels:
      app: cart-service-app
  
  template:
    metadata:
      labels:
        app: cart-service-app

    spec:
      containers:
        - name: cart-service
          image: chaitanyaaaa/ecommerce-microservices-cart-service:v1
          
          ports:
            - containerPort: 3003
          
          envFrom:
            - configMapRef:
                name: cart-service-configmap
            - secretRef:
                name: app-secrets

