apiVersion: apps/v1
kind: Deployment

metadata:
  name: mongodb-depl
  namespace: ecommerce

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mongodb-app

  template:
    metadata:
      labels:
        app: mongodb-app

    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017

          envFrom:
            - secretRef:
                name: app-secrets

          volumeMounts:
            - name: mongodb-data-storage
              mountPath: /data/db
  
      volumes:
        - name: mongodb-data-storage
          persistentVolumeClaim:
            claimName: mongodb-pvc

