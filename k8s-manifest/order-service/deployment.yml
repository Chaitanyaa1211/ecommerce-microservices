apiVersion: apps/v1
kind: Deployment

metadata:
  name: order-service-depl
  namespace: ecommerce

spec:

  replicas: 1

  selector:
    matchLabels:
      app: order-service-app

  template:
    metadata:
      labels:
        app: order-service-app

    spec:
      containers:
        - name: order-service
          image: chaitanyaaaa/ecommerce-microservices-order-service:v1
          ports:
            - containerPort: 3004

          envFrom:
            - configMapRef:
                name: order-service-configmap

            - secretRef:
                name: app-secrets

        
